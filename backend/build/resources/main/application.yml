server:
  port: 8080

spring:
  application:
    name: code-reviewer-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/codereviewer
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Database schema validation. Tables are created/managed by Flyway.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
