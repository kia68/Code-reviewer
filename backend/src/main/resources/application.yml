server:
  port: 8080

spring:
  application:
    name: code-reviewer-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:codereviewer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Database schema validation. Tables are created/managed by Flyway.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  ingestion:
    storage-dir: ${INGESTION_STORAGE_DIR:./data/uploads}
    max-file-size-bytes: ${INGESTION_MAX_FILE_SIZE_BYTES:2000000}
    max-zip-size-bytes: ${INGESTION_MAX_ZIP_SIZE_BYTES:20000000}
    max-zip-entries: ${INGESTION_MAX_ZIP_ENTRIES:2000}
    max-extracted-bytes: ${INGESTION_MAX_EXTRACTED_BYTES:50000000}
  analysis:
    long-method-line-threshold: ${ANALYSIS_LONG_METHOD_LINES:40}
    max-nesting-depth: ${ANALYSIS_MAX_NESTING_DEPTH:3}

codereviewer:
  llm:
    provider: anthropic
    api-key: ${LLM_API_KEY:}
    base-url: https://api.anthropic.com
    model: ${LLM_MODEL:claude-sonnet-4-5-20250929}
    max-tokens-per-call: ${LLM_MAX_TOKENS:8192}
    max-reflect-rounds: ${LLM_MAX_REFLECT_ROUNDS:0}
    cache-enabled: true
    cache-ttl-hours: 24
    daily-token-budget: 200000
    rate-limit:
      calls-per-period: 10
      period-seconds: 60
      
