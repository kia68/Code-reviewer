services:
  postgres:
    image: postgres:16-alpine
    container_name: code-reviewer-postgres
    environment:
      POSTGRES_DB: codereviewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codereviewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: code-reviewer-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: codereviewer
      DB_USERNAME: postgres
      DB_PASSWORD: password
      # LLM-Review nur aktiv, wenn LLM_API_KEY oder ANTHROPIC_API_KEY in der Shell gesetzt ist; sonst leer -> LLM wird übersprungen (nur AST)
      LLM_API_KEY: ${LLM_API_KEY:-${ANTHROPIC_API_KEY:-}}
      # Provider-Umschaltung: anthropic (default) oder openai (z.B. GWDG SAIA / Chat AI).
      # Für GWDG: LLM_PROVIDER=openai, LLM_BASE_URL=https://chat-ai.academiccloud.de/v1, LLM_MODEL=<id aus /v1/models>
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-5-20250929}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/data/uploads

  frontend:
    build:
      context: ./frontend
    container_name: code-reviewer-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
  backend-uploads:
    driver: local
