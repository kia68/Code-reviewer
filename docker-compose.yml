services:
  postgres:
    image: postgres:16-alpine
    container_name: code-reviewer-postgres
    environment:
      POSTGRES_DB: codereviewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codereviewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: code-reviewer-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: codereviewer
      DB_USERNAME: postgres
      DB_PASSWORD: password
      # LLM-Review nur aktiv, wenn LLM_API_KEY in der Shell gesetzt ist; sonst leer -> LLM wird übersprungen (nur AST)
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/data/uploads

  frontend:
    build:
      context: ./frontend
    container_name: code-reviewer-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
  backend-uploads:
    driver: local
